name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker BuildKit
        run: |
          export DOCKER_BUILDKIT=1

      - name: Build Docker Image
        run: |
          docker build -t my-docker-image:latest .

      - name: Log in to Container Registry
        run: |
          echo ${CONTAINER_REGISTRY_PASSWORD} | docker login ${CONTAINER_REGISTRY} -u ${CONTAINER_REGISTRY_USERNAME} --password-stdin

      - name: Push Docker Image
        run: |
          docker push my-docker-image:latest

      - name: Deploy to Cloud Provider
        run: |
          # Insert your cloud provider deployment command here
          echo 'Deploying to cloud provider'