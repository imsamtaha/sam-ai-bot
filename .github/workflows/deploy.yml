# Deployment Workflow

name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Log in to Docker Hub
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: |
        echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin

    - name: Build Docker image
      run: |
        docker build -t my-image:latest .

    - name: Verify Docker image
      run: |
        docker run --rm my-image:latest

    - name: Push Docker image to Registry
      run: |
        docker tag my-image:latest my-docker-repo/my-image:latest
        docker push my-docker-repo/my-image:latest

    - name: Deployment Instructions
      run: |
        echo "# Deployment Instructions"
        echo "Set up your Docker Hub credentials in GitHub Secrets as DOCKER_USERNAME and DOCKER_PASSWORD."
        echo "Ensure that your Docker repository is 'my-docker-repo' and update with your details if necessary."